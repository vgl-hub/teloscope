name: Validate

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-2025]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
            submodules: true

    - name: Build
      run: make all -j

    - name: Validate (POSIX)
      if: runner.os != 'Windows'
      shell: bash
      run: bash .github/workflows/val.sh

    - name: Validate (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: .\.github\workflows\val.bat

    - name: Validate BAM subset
      run: python3 scripts/test_bam_subset.py

  bam-coverage:
    name: BAM 100% executable-line coverage
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Run strict BAM coverage
      run: make test-bam-coverage

  bam-sanitizers:
    name: BAM ASan and UBSan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Run sanitized BAM tests
      run: make test-bam-sanitize

  bam-oracle:
    name: BAM samtools oracle and fault injection
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install samtools
      run: sudo apt-get update && sudo apt-get install -y samtools

    - name: Run BAM hardening tests
      run: make test-bam-hardening
