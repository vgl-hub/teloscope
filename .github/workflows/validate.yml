name: Validate

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-2025]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
            submodules: true

    - name: Build
      run: make all -j

    - name: Validate (POSIX)
      if: runner.os != 'Windows'
      shell: bash
      run: bash .github/workflows/val.sh

    - name: Validate (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: .\.github\workflows\val.bat
