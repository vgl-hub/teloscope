name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create_release:
    name: Create Release
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
    # Create as a draft so the release is invisible until every asset is
    # attached. Bioconda's autobump bot downloads
    # teloscope.v<version>-with_submodules.zip to compute the recipe sha256; if
    # the release published before that (slow) upload finished, the bot could
    # 404 and land a bad hash. publish_release flips draft->false at the end.
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: teloscope ${{ github.ref_name }}
        generate_release_notes: true
        draft: true
        prerelease: false

  add_resources:
    needs: create_release
    name: Add Resources
    permissions: write-all
    strategy:
      matrix:
        OS: [macos-latest, ubuntu-latest, windows-2025]
        include:
        - OS: macos-latest
          OS_NAME: macOS
        - OS: ubuntu-latest
          OS_NAME: linux
        - OS: windows-2025
          OS_NAME: win
    runs-on: ${{ matrix.OS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
            submodules: true
      - name: Build
        run: make
      - name: Zip
        id: package
        run: |
          asset="${RUNNER_TEMP}/teloscope.${{ github.ref_name }}-${{ matrix.OS_NAME }}.zip"
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -NoProfile -Command "Compress-Archive -Path 'build/bin/teloscope*' -DestinationPath '${asset}'"
          else
            zip -j "$asset" build/bin/teloscope*
          fi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}

  add_submodules:
    needs: create_release
    name: Source with submodules
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
            submodules: true
      - name: Zip
        id: package
        run: |
          asset="${RUNNER_TEMP}/teloscope.${{ github.ref_name }}-with_submodules.zip"
          zip -r "$asset" . -x ".git/*"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
      - name: Upload source
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}

  # Publish only after all assets are uploaded, so the release (and its
  # download URLs) become visible to the Bioconda autobump bot atomically.
  publish_release:
    needs: [add_resources, add_submodules]
    name: Publish Release
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          name: teloscope ${{ github.ref_name }}
          draft: false
